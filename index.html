  <!-- =======================
       SCRIPT FUNCIONAL (NOVO)
  ======================== -->
  <script>
    const form = document.querySelector(".form-nova-tarefa");
    const input = document.getElementById("input-nova-tarefa");
    const select = document.getElementById("select-prioridade");
    const lista = document.getElementById("lista-tarefas");
    const info = document.querySelector(".lista-rodape__info");

    let total = document.querySelectorAll(".task-item").length;
    let pendentes = document.querySelectorAll(".task-check:not(:checked)").length;

    function atualizarContador() {
      info.innerHTML = `<strong>${pendentes}</strong>&nbsp;tarefas pendentes de ${total}`;
    }

    // eventos nos checkboxes existentes
    document.querySelectorAll(".task-check").forEach(cb => {
      cb.addEventListener("change", () => {
        if (cb.checked) pendentes--;
        else pendentes++;
        atualizarContador();
      });
    });

    // adicionar nova tarefa
    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const texto = input.value.trim();
      const prioridade = select.value;

      if (!texto) return;

      total++;
      pendentes++;

      const id = "task-" + total;

      const li = document.createElement("li");

      li.innerHTML = `
        <input type="checkbox" id="${id}" class="task-check">
        <label for="${id}" class="task-item prioridade-${prioridade}">
          <span class="task-item__check"></span>
          <span class="task-item__conteudo">
            <span class="task-item__texto">${texto}</span>
            <span class="task-item__badge">
              ${prioridade.charAt(0).toUpperCase() + prioridade.slice(1)}
            </span>
          </span>
        </label>
      `;

      lista.appendChild(li);

      const checkbox = li.querySelector(".task-check");

      checkbox.addEventListener("change", () => {
        if (checkbox.checked) pendentes--;
        else pendentes++;
        atualizarContador();
      });

      atualizarContador();
      input.value = "";
    });

    atualizarContador();
  </script>

</body>
