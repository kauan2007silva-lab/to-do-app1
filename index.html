<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List — Projeto Acadêmico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* RESET E VARIÁVEIS */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --fonte-display: 'Syne', sans-serif;
      --fonte-corpo: 'DM Sans', sans-serif;
      --cor-fundo: #F4EFE6;
      --cor-superficie: #FDFAF5;
      --cor-texto: #383848;
      --cor-muted: #888898;
      --cor-acento: #D9725A;
      --cor-acento-hover: #BF5C45;
      --cor-borda: #DDD8CE;
      
      --prioridade-alta: #E07060;
      --prioridade-media: #D99A38;
      --prioridade-baixa: #52A060;
    }

    body {
      font-family: var(--fonte-corpo);
      background: var(--cor-fundo);
      color: var(--cor-texto);
      padding: 40px 20px;
      line-height: 1.6;
    }

    .container { max-width: 600px; margin: 0 auto; }

    header h1 { font-family: var(--fonte-display); font-size: 2.5rem; margin-bottom: 20px; text-align: center; }

    /* FORMULÁRIO */
    .form-nova-tarefa { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
    .form-nova-tarefa input, .form-nova-tarefa select {
      padding: 12px; border: 1.5px solid var(--cor-borda); border-radius: 8px; outline: none;
    }
    .form-nova-tarefa input { flex: 1; min-width: 200px; }
    .form-nova-tarefa button {
      padding: 12px 20px; background: var(--cor-acento); color: white; border: none; 
      border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
    }
    .form-nova-tarefa button:hover { background: var(--cor-acento-hover); }

    /* CARTÃO E FILTROS */
    .lista-cartao { background: var(--cor-superficie); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    
    .lista-filtros { display: flex; background: rgba(0,0,0,0.02); border-bottom: 1px solid var(--cor-borda); }
    .btn-filtro {
      flex: 1; padding: 15px; border: none; background: none; cursor: pointer;
      color: var(--cor-muted); font-weight: 500; transition: 0.3s;
    }
    .btn-filtro.ativo { color: var(--cor-acento); background: white; border-bottom: 2px solid var(--cor-acento); }

    /* ITENS DA LISTA */
    #lista-tarefas { list-style: none; }
    .task-item {
      display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--cor-borda);
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .task-check { width: 20px; height: 20px; cursor: pointer; accent-color: var(--cor-acento); margin-right: 15px; }
    
    .task-conteudo { flex: 1; display: flex; flex-direction: column; }
    .task-texto { font-size: 1rem; }
    .concluida .task-texto { text-decoration: line-through; color: var(--cor-muted); }

    .badge { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-top: 4px; }
    .badge-alta { color: var(--prioridade-alta); }
    .badge-media { color: var(--prioridade-media); }
    .badge-baixa { color: var(--prioridade-baixa); }

    .btn-deletar {
      background: none; border: none; color: #ff5e5e; cursor: pointer; 
      font-size: 1.2rem; margin-left: 15px; opacity: 0.5; transition: 0.3s;
    }
    .btn-deletar:hover { opacity: 1; transform: scale(1.2); }

    .rodape { padding: 15px 20px; font-size: 0.8rem; color: var(--cor-muted); text-align: center; }

    /* ESTADO VAZIO */
    .vazio { padding: 40px; text-align: center; color: var(--cor-muted); font-style: italic; }
  </style>
</head>
<body>

  <main class="container">
    <header>
      <h1>Minhas Tarefas</h1>
    </header>

    <form class="form-nova-tarefa" id="todo-form">
      <input type="text" id="task-input" placeholder="O que precisa ser feito?" required>
      <select id="task-priority">
        <option value="alta">Alta</option>
        <option value="media" selected>Média</option>
        <option value="baixa">Baixa</option>
      </select>
      <button type="submit">Adicionar</button>
    </form>

    <div class="lista-cartao">
      <nav class="lista-filtros">
        <button class="btn-filtro ativo" data-filter="todas">Todas</button>
        <button class="btn-filtro" data-filter="ativas">Ativas</button>
        <button class="btn-filtro" data-filter="concluidas">Concluídas</button>
      </nav>

      <ul id="lista-tarefas">
        </ul>

      <div class="rodape" id="contador">0 tarefas pendentes</div>
    </div>
  </main>

  <script>
    let tarefas = JSON.parse(localStorage.getItem('minhasTarefas')) || [];
    let filtroAtual = 'todas';

    const form = document.getElementById('todo-form');
    const input = document.getElementById('task-input');
    const priority = document.getElementById('task-priority');
    const listaUl = document.getElementById('lista-tarefas');
    const contador = document.getElementById('contador');
    const botoesFiltro = document.querySelectorAll('.btn-filtro');

    // ADICIONAR TAREFA
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const novaTarefa = {
        id: Date.now(),
        texto: input.value,
        prioridade: priority.value,
        concluida: false
      };
      tarefas.push(novaTarefa);
      salvarERenderizar();
      input.value = '';
    });

    // RENDERIZAR LISTA
    function renderizar() {
      listaUl.innerHTML = '';
      
      // Filtragem
      const tarefasFiltradas = tarefas.filter(t => {
        if (filtroAtual === 'ativas') return !t.concluida;
        if (filtroAtual === 'concluidas') return t.concluida;
        return true;
      });

      if (tarefasFiltradas.length === 0) {
        listaUl.innerHTML = `<div class="vazio">Nenhuma tarefa aqui...</div>`;
      }

      tarefasFiltradas.forEach(tarefa => {
        const li = document.createElement('li');
        li.className = `task-item ${tarefa.concluida ? 'concluida' : ''}`;
        
        li.innerHTML = `
          <input type="checkbox" class="task-check" ${tarefa.concluida ? 'checked' : ''} onchange="toggleConcluir(${tarefa.id})">
          <div class="task-conteudo">
            <span class="task-texto">${tarefa.texto}</span>
            <span class="badge badge-${tarefa.prioridade}">${tarefa.prioridade}</span>
          </div>
          <button class="btn-deletar" onclick="deletarTarefa(${tarefa.id})">🗑️</button>
        `;
        listaUl.appendChild(li);
      });

      atualizarContador();
    }

    // ALTERAR STATUS
    window.toggleConcluir = (id) => {
      tarefas = tarefas.map(t => t.id === id ? {...t, concluida: !t.concluidda} : t);
      // Pequeno atraso para a animação visual antes de sumir se estiver no filtro
      setTimeout(salvarERenderizar, 150);
    };

    // DELETAR
    window.deletarTarefa = (id) => {
      tarefas = tarefas.filter(t => t.id !== id);
      salvarERenderizar();
    };

    // CONTADOR
    function atualizarContador() {
      const pendentes = tarefas.filter(t => !t.concluida).length;
      contador.innerText = `${pendentes} tarefas pendentes de ${tarefas.length} no total`;
    }

    // LÓGICA DE FILTROS (CLIQUES)
    botoesFiltro.forEach(botao => {
      botao.addEventListener('click', () => {
        botoesFiltro.forEach(b => b.classList.remove('ativo'));
        botao.classList.add('ativo');
        filtroAtual = botao.getAttribute('data-filter');
        renderizar();
      });
    });

    function salvarERenderizar() {
      localStorage.setItem('minhasTarefas', JSON.stringify(tarefas));
      renderizar();
    }

    // INICIAR
    renderizar();
  </script>
</body>
</html>
